name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-X late/internal/common.Version=${{ github.ref_name }}" \
            -o late-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/late
          go build -ldflags "-X late/internal/common.Version=${{ github.ref_name }}" \
            -o late-sast-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/late-sast

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            late-${{ matrix.os }}-${{ matrix.arch }}*
            late-sast-${{ matrix.os }}-${{ matrix.arch }}*
