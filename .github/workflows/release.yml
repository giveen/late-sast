name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Fetch codebase-memory-mcp for embedding
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p cmd/late-sast/embedded
          if [ "${{ matrix.os }}" = "windows" ]; then
            curl -fsSL "https://github.com/DeusData/codebase-memory-mcp/releases/latest/download/codebase-memory-mcp-windows-amd64.zip" \
              -o /tmp/cbm.zip
            unzip -p /tmp/cbm.zip codebase-memory-mcp.exe > cmd/late-sast/embedded/codebase-memory-mcp
          else
            curl -fsSL "https://github.com/DeusData/codebase-memory-mcp/releases/latest/download/codebase-memory-mcp-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
              | tar -xzO "codebase-memory-mcp" > cmd/late-sast/embedded/codebase-memory-mcp
          fi
          chmod +x cmd/late-sast/embedded/codebase-memory-mcp

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-X late/internal/common.Version=${{ github.ref_name }}" \
            -tags cbm_embedded \
            -o late-sast-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/late-sast

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: late-sast-${{ matrix.os }}-${{ matrix.arch }}*
